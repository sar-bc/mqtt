services:
  postgres:
    image: postgres:15-alpine
    container_name: mqtt_postgres
    environment:
      POSTGRES_DB: mqtt_auth
      POSTGRES_USER: sar-bc
      POSTGRES_PASSWORD: Vik159753
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./init/postgres.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - mqtt_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sar-bc -d mqtt_auth"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: iegomez/mosquitto-go-auth:latest
    container_name: mqtt_cont
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./config/mosquitto.conf:/etc/mosquitto/mosquitto.conf
      - ./data:/mosquitto/data
      - ./log:/mosquitto/log
    networks:
      - mqtt_network
    restart: unless-stopped

networks:
  mqtt_network:
    driver: bridge
    