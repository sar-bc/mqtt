# Основные настройки
persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all
allow_anonymous false

# Подключаем Go-плагин
auth_plugin /mosquitto/plugins/go-auth.so

# Включаем SQLite бэкенд
auth_opt_backends sqlite

# Настройки SQLite
auth_opt_sqlite_path /mosquitto/config/mqtt_users.db
auth_opt_sqlite_userquery SELECT password FROM users WHERE username = ? AND enabled = 1
auth_opt_sqlite_superquery SELECT superuser FROM users WHERE username = ?

# Кэширование
auth_opt_cache true
auth_opt_cache_type memory
auth_opt_auth_cache_seconds 60
auth_opt_acl_cache_seconds 300

# Логирование плагина
auth_opt_log_level debug
auth_opt_log_dest stdout
