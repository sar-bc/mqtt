# Основные настройки
persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all
allow_anonymous false

# Подключаем Go-плагин
auth_plugin /mosquitto/plugins/go-auth.so

# Включаем ТОЛЬКО PostgreSQL бэкенд
auth_opt_backends postgres

# Настройки подключения к PostgreSQL
auth_opt_postgres_host postgres
auth_opt_postgres_port 5432
auth_opt_postgres_user mqtt_admin
auth_opt_postgres_password MqttSecurePass123!
auth_opt_postgres_dbname mqtt_auth
auth_opt_postgres_sslmode disable

# SQL запросы для аутентификации
auth_opt_postgres_userquery SELECT password_hash FROM users WHERE username = $1 AND enabled = true
auth_opt_postgres_superquery SELECT is_admin FROM users WHERE username = $1 AND enabled = true

# Кэширование
auth_opt_cache true
auth_opt_cache_type memory
auth_opt_auth_cache_seconds 60
auth_opt_acl_cache_seconds 300

# Логирование плагина
auth_opt_log_level debug
auth_opt_log_dest stdout