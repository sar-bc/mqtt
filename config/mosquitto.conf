# ============================================
# ОСНОВНЫЕ НАСТРОЙКИ
# ============================================
listener 1883 0.0.0.0
persistence true
persistence_location /mosquitto/data/
log_dest stdout
log_type all
allow_anonymous false

# ============================================
# ПЛАГИН АУТЕНТИФИКАЦИИ
# ============================================
auth_plugin /mosquitto/go-auth.so
auth_opt_backends postgres

# ============================================
# НАСТРОЙКИ POSTGRESQL
# ============================================
auth_opt_pg_host postgres
auth_opt_pg_port 5432
auth_opt_pg_user sar-bc
auth_opt_pg_password Vik159753
auth_opt_pg_dbname mqtt_auth
auth_opt_pg_userquery SELECT password_hash FROM users WHERE username = $1 AND enabled = 1
auth_opt_pg_superquery SELECT is_admin FROM users WHERE username = $1 AND enabled = 1

# ============================================
# НАСТРОЙКИ ХЕШИРОВАНИЯ (ВАЖНО!)
# ============================================
auth_opt_hasher bcrypt
auth_opt_hasher_cost 12

# ============================================
# ДОПОЛНИТЕЛЬНЫЕ ПАРАМЕТРЫ
# ============================================
auth_opt_pg_sslmode disable
auth_opt_pg_prefer_simple_protocol true
auth_opt_cache false
auth_opt_acl_cache_seconds 0
auth_opt_cache_type memory
auth_opt_auth_cache_seconds 60
auth_opt_acl_cache_seconds 300
auth_opt_log_level debug
auth_opt_log_dest stdout