# ===== ОСНОВНЫЕ НАСТРОЙКИ =====
listener 1883 0.0.0.0
allow_anonymous false
persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all

# ===== ПЛАГИН АУТЕНТИФИКАЦИИ =====
auth_plugin /mosquitto/auth-plug.so
auth_opt_backends postgres

# ===== ПОДКЛЮЧЕНИЕ К POSTGRESQL =====
auth_opt_host postgres
auth_opt_port 5432
auth_opt_user mqtt_user
auth_opt_pass Vik159753  
auth_opt_dbname mqtt

# ===== SQL-ЗАПРОСЫ =====
# Получение хеша пароля
auth_opt_userquery SELECT password_hash FROM users WHERE username = '%s' LIMIT 1

# Проверка суперпользователя
auth_opt_superquery SELECT is_superuser FROM users WHERE username = '%s' LIMIT 1

# Проверка ACL (rw >= %d означает: для чтения подходят rw=1 и rw=3, для записи - rw=2 и rw=3)
auth_opt_aclquery SELECT topic FROM acls WHERE username = '%s' AND rw >= %d

# ===== КЭШИРОВАНИЕ =====
auth_opt_auth_cacheseconds 60
auth_opt_acl_cacheseconds 300
auth_opt_acl_cachepersist yes
