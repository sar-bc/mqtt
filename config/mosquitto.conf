# ============================================
# ОСНОВНЫЕ НАСТРОЙКИ MOSQUITTO
# ============================================

# Персистентность
persistence true
persistence_location /mosquitto/data/

# Логирование
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all

# Безопасность
allow_anonymous false

# ============================================
# НАСТРОЙКИ ПЛАГИНА
# ============================================

# Загрузка плагина - ИСПРАВЛЕННЫЙ ПУТЬ!
auth_plugin /mosquitto/go-auth.so

# Настройки бэкенда (MariaDB/MySQL)
auth_opt_backends mysql
auth_opt_mysql_host mariadb
auth_opt_mysql_port 3306
auth_opt_mysql_user sar-bc
auth_opt_mysql_password Vik159753
auth_opt_mysql_dbname mqtt_auth
auth_opt_mysql_userquery SELECT password_hash FROM users WHERE username = ? AND enabled = true
auth_opt_mysql_superquery SELECT is_admin FROM users WHERE username = ? AND enabled = true

# Кэширование для производительности
auth_opt_cache true
auth_opt_cache_type memory
auth_opt_auth_cache_seconds 60
auth_opt_acl_cache_seconds 300

# Логирование плагина
auth_opt_log_level debug
auth_opt_log_dest stdout