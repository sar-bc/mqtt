# ============================================
# ОСНОВНЫЕ НАСТРОЙКИ
# ============================================
persistence true
persistence_location /mosquitto/data/
log_dest stdout
log_type all
allow_anonymous false

# ============================================
# ПЛАГИН АУТЕНТИФИКАЦИИ
# ============================================
auth_plugin /mosquitto/go-auth.so

# ============================================
# НАСТРОЙКИ POSTGRESQL (ВСЕ ПАРАМЕТРЫ!)
# ============================================
auth_opt_backends postgres

# Обязательные параметры подключения
auth_opt_postgres_host postgres
auth_opt_postgres_port 5432
auth_opt_postgres_user sar-bc
auth_opt_postgres_password Vik159753
auth_opt_postgres_dbname mqtt_auth

# SQL запросы (обязательны!)
auth_opt_postgres_userquery SELECT password_hash FROM users WHERE username = $1 AND enabled = true
auth_opt_postgres_superquery SELECT is_admin FROM users WHERE username = $1 AND enabled = true

# Дополнительные параметры (для производительности)
auth_opt_postgres_sslmode disable
auth_opt_postgres_max_idle_conns 10
auth_opt_postgres_max_open_conns 100

# ============================================
# КЭШИРОВАНИЕ
# ============================================
auth_opt_cache true
auth_opt_cache_type memory
auth_opt_auth_cache_seconds 60
auth_opt_acl_cache_seconds 300
