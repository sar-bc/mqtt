# config/mosquitto.conf (фрагмент)

# Отключаем анонимный доступ
allow_anonymous false

# Подключаем плагин (путь из Dockerfile)
auth_plugin /mosquitto/auth-plug.so

# Указываем бэкенд PostgreSQL
auth_opt_backends postgres

# Параметры подключения к БД (имена сервисов из docker-compose)
auth_opt_host postgres
auth_opt_port 5432
auth_opt_user mqtt_user
auth_opt_pass your_strong_password  # Возьмите из переменных окружения!
auth_opt_dbname mqtt

# SQL-запросы для плагина
auth_opt_userquery SELECT password_hash FROM users WHERE username = '%s' LIMIT 1
auth_opt_superquery SELECT is_superuser FROM users WHERE username = '%s' LIMIT 1
# Важно: rw >= %d означает, что для чтения (rw=1) подойдут правила с rw=1 или 3
auth_opt_aclquery SELECT topic FROM acls WHERE username = '%s' AND rw >= %d

# Кэширование для производительности
auth_opt_auth_cacheseconds 60
auth_opt_acl_cacheseconds 300

# Остальные настройки (listener, persistence и т.д.) оставьте как есть
listener 1883 0.0.0.0